version: "3.8"

services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/myapp
      - SECRET_KEY=my-super-secret-app-key
      - API_TOKEN=tok_live_abcdef123456
    volumes:
      - .:/app
    # Running as root (no user specified)
    # No health check defined
    # No resource limits

  db:
    image: postgres:latest  # Should pin version
    environment:
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"  # Exposing DB port to host
    # No volume for data persistence
