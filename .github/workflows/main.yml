name: PR Code Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: MichaelFu1998-create/chatgpt-pr-review@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_pr_id: ${{ github.event.number }}
          review_persona: "mentor"
          enable_scoring: "true"
          max_files: "50"
          logging: "info"
          tools: "semgrep,ruff,bandit,eslint,npm_audit,detect_secrets,hadolint,shellcheck,pmd,checkstyle,golangci_lint,trivy,checkov"
          severity_threshold: "info"
          files: "*.py,*.js,*.ts,*.java,*.go,*.sh,*.rb,*.tf,Dockerfile,docker-compose.yaml"
